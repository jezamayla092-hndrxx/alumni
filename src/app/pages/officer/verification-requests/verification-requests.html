<section class="verification-page">

  <div class="page-heading">
    <h1>Verification Requests</h1>
    <p>Review and process alumni registration applications.</p>
  </div>

  <!-- FILTERS -->
  <section class="filters-card">

    <div class="verification-filters-grid">

      <div class="search-field">
        <i class="pi pi-search"></i>
        <input type="text" [(ngModel)]="searchTerm" placeholder="Search..." />
      </div>

      <div class="filter-buttons">

        <button class="filter-btn" [class.active]="activeFilter==='all'" (click)="setFilter('all')">All</button>
        <button class="filter-btn pending" [class.active]="activeFilter==='pending'" (click)="setFilter('pending')">Pending</button>
        <button class="filter-btn review" [class.active]="activeFilter==='under_review'" (click)="setFilter('under_review')">Under Review</button>
        <button class="filter-btn approved" [class.active]="activeFilter==='approved'" (click)="setFilter('approved')">Approved</button>
        <button class="filter-btn rejected" [class.active]="activeFilter==='rejected'" (click)="setFilter('rejected')">Rejected</button>

      </div>

    </div>

  </section>

  <!-- TABLE -->
  <section class="table-card">

    <div class="table-scroll">

      <table class="verification-table">

        <thead>
          <tr>
            <th>Name</th>
            <th>Program</th>
            <th>Year</th>
            <th>Date</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>

        <tbody>

          <tr *ngIf="loading">
            <td colspan="6">Loading...</td>
          </tr>

          <tr *ngFor="let request of filteredRequests; trackBy: trackByRequestId">

            <td class="name-cell">{{ request.fullName }}</td>
            <td>{{ request.program || '—' }}</td>
            <td>{{ request.yearGraduated || '—' }}</td>
            <td>{{ formatDate(request.submittedAt) }}</td>

            <td>
              <span class="status-pill" [ngClass]="getStatusClass(request.status)">
                {{ getStatusLabel(request.status) }}
              </span>
            </td>

            <td>

              <!-- REVIEW ICON -->
              <button
                *ngIf="request.status === 'pending'"
                class="icon-btn"
                (click)="markAsUnderReview(request, $event)"
              >
                ⏳
              </button>

              <!-- EYE ICON (FIXED - NO LIBRARY NEEDED) -->
              <button
                *ngIf="request.status !== 'pending'"
                class="icon-btn view"
                (click)="openDetails(request, $event)"
              >
                <svg viewBox="0 0 24 24" width="16" height="16">
                  <path fill="currentColor"
                    d="M12 5c-7 0-10 7-10 7s3 7 10 7 10-7 10-7-3-7-10-7zm0 12a5 5 0 1 1 0-10 5 5 0 0 1 0 10z"/>
                </svg>
              </button>

            </td>

          </tr>

        </tbody>

      </table>

    </div>

  </section>

</section>
