<div class="signup-page">
  <section class="form-panel">
    <div class="signup-card">
      <div class="signup-header">
        <h1>Create Alumni Account</h1>
        <p>Fill in your details for alumni verification</p>
      </div>

      <div class="form-grid">
        <div class="form-field">
          <input id="firstName" type="text" [(ngModel)]="firstName" placeholder=" " [disabled]="loading" />
          <label for="firstName">First Name</label>
        </div>

        <div class="form-field">
          <input id="middleName" type="text" [(ngModel)]="middleName" placeholder=" " [disabled]="loading" />
          <label for="middleName">Middle Name</label>
        </div>
      </div>

      <div class="form-grid">
        <div class="form-field">
          <input id="lastName" type="text" [(ngModel)]="lastName" placeholder=" " [disabled]="loading" />
          <label for="lastName">Last Name</label>
        </div>

        <div class="form-field">
          <input id="suffix" type="text" [(ngModel)]="suffix" placeholder=" " [disabled]="loading" />
          <label for="suffix">Suffix (Optional)</label>
        </div>
      </div>

      <div class="form-field">
        <input id="email" type="email" [(ngModel)]="email" placeholder=" " [disabled]="loading" />
        <label for="email">Email</label>
      </div>

      <div class="form-field">
        <input id="contactNumber" type="text" [(ngModel)]="contactNumber" placeholder=" " [disabled]="loading" />
        <label for="contactNumber">Contact Number</label>
      </div>

      <div class="form-grid">
        <div class="form-field">
          <input id="studentId" type="text" [(ngModel)]="studentId" placeholder=" " [disabled]="loading" />
          <label for="studentId">Student / University ID</label>
        </div>

        <div class="form-field">
          <input id="yearGraduated" type="number" [(ngModel)]="yearGraduated" placeholder=" " [disabled]="loading" />
          <label for="yearGraduated">Year Graduated</label>
        </div>
      </div>

      <!-- PROGRAM -->
      <div class="form-field program-field">
        <button
          type="button"
          class="program-trigger"
          (click)="toggleProgramDropdown($event)"
          [disabled]="loading"
          [class.active]="programDropdownOpen"
        >
          <span class="program-text" [class.placeholder]="!program">
            {{ program || 'Select program' }}
          </span>

          <span class="material-symbols-outlined arrow">
            {{ programDropdownOpen ? 'keyboard_arrow_up' : 'keyboard_arrow_down' }}
          </span>
        </button>

        <div class="program-menu" *ngIf="programDropdownOpen" (click)="$event.stopPropagation()">
          <button
            type="button"
            class="program-option"
            *ngFor="let item of programs"
            (click)="selectProgram(item)"
          >
            {{ item }}
          </button>
        </div>
      </div>

      <!-- MULTI DOCUMENT UPLOAD -->
      <div class="upload-box">
        <div class="upload-info">
          <span class="material-symbols-outlined">upload_file</span>

          <div>
            <strong>Verification Documents</strong>

            <p *ngIf="selectedDocuments.length === 0">
              Upload diploma, TOR, certificate, school ID, etc.
            </p>

            <ul *ngIf="selectedDocuments.length > 0" class="file-list">
              <li *ngFor="let file of selectedDocuments">
                {{ file.name }}
              </li>
            </ul>
          </div>
        </div>

        <label class="upload-btn">
          Choose Files
          <input
            type="file"
            multiple
            accept=".pdf,.jpg,.jpeg,.png"
            (change)="onDocumentsSelected($event)"
            [disabled]="loading"
          />
        </label>
      </div>

      <p class="upload-note">
        You can upload multiple documents for faster verification.
      </p>

      <!-- PASSWORD -->
      <div class="form-field password-field">
        <input
          id="password"
          [type]="showPassword ? 'text' : 'password'"
          [(ngModel)]="password"
          placeholder=" "
          [disabled]="loading"
        />
        <label for="password">Password</label>

        <button
          type="button"
          class="toggle-password"
          (click)="togglePassword()"
          *ngIf="password"
        >
          <span class="material-symbols-outlined">
            {{ showPassword ? 'visibility' : 'visibility_off' }}
          </span>
        </button>
      </div>

      <div class="form-field password-field">
        <input
          id="confirmPassword"
          [type]="showConfirmPassword ? 'text' : 'password'"
          [(ngModel)]="confirmPassword"
          placeholder=" "
          [disabled]="loading"
        />
        <label for="confirmPassword">Confirm Password</label>

        <button
          type="button"
          class="toggle-password"
          (click)="toggleConfirmPassword()"
          *ngIf="confirmPassword"
        >
          <span class="material-symbols-outlined">
            {{ showConfirmPassword ? 'visibility' : 'visibility_off' }}
          </span>
        </button>
      </div>

      <button class="signup-btn" (click)="onSignup()" [disabled]="loading">
        {{ loading ? 'Creating Account...' : 'Create Account' }}
      </button>

      <p class="login-link">
        Already have an account?
        <a routerLink="/login">Login</a>
      </p>
    </div>
  </section>
</div>
