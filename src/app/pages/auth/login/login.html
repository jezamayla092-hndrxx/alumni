<div class="login-page">

  <!-- ATMS Branding -->
  <div class="login-page-logo">
    <span class="logo-name">ATMS</span>
  </div>

  <!-- Floating bubbles -->
  <div class="login-bubbles">
    <div class="login-bubble"></div>
    <div class="login-bubble"></div>
    <div class="login-bubble"></div>
    <div class="login-bubble"></div>
    <div class="login-bubble"></div>
    <div class="login-bubble"></div>
  </div>

  <section class="form-panel">

    <div class="login-card">

      <h1 class="card-title">Sign in to your account</h1>

      <div class="form-field">
        <input
          id="email"
          type="email"
          [(ngModel)]="email"
          name="email"
          placeholder=" "
          [disabled]="loading"
          autocomplete="email"
        />
        <label for="email">Email address</label>
      </div>

      <div class="form-field password-field">
        <input
          id="password"
          [type]="showPassword ? 'text' : 'password'"
          [(ngModel)]="password"
          name="password"
          placeholder=" "
          [disabled]="loading"
          autocomplete="current-password"
        />
        <label for="password">Password</label>

        <button
          type="button"
          class="toggle-password"
          (click)="togglePassword()"
          [disabled]="loading"
          *ngIf="password && password.length > 0"
          aria-label="Toggle password visibility"
        >
          <span class="material-symbols-outlined">
            {{ showPassword ? 'visibility' : 'visibility_off' }}
          </span>
        </button>
      </div>

      <button
        type="button"
        class="login-btn"
        [class.is-loading]="loading"
        [attr.aria-disabled]="loading"
        (click)="onLogin()"
      >
        <svg
          *ngIf="loading"
          class="login-spinner"
          width="26"
          height="26"
          viewBox="0 0 32 32"
          aria-hidden="true"
        >
          <path class="login-spinner-arc" d="M16 4a12 12 0 0 1 12 12"></path>
        </svg>
        <span *ngIf="!loading">Sign in</span>
      </button>

      <p class="signup-link">
        Don't have an account?
        <a routerLink="/signup">Create one</a>
      </p>

    </div>

  </section>

</div>
