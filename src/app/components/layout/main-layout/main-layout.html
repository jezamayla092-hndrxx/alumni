<ng-container *ngIf="!loadingUser; else layoutLoading">
  <div
    class="layout-shell"
    [class.sidebar-collapsed]="sidebarCollapsed"
    [class.dark-mode]="darkMode"
  >
    <div
      class="sidebar-backdrop"
      *ngIf="isMobileView && !sidebarCollapsed"
      (click)="toggleSidebar()"
    ></div>

    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="brand-wrap">
          <div class="brand-icon">
            <i class="pi pi-graduation-cap"></i>
          </div>

          <div class="brand-text" *ngIf="!sidebarCollapsed">
            <h2>ATMS</h2>
          </div>
        </div>
      </div>

      <nav class="sidebar-nav" aria-label="Officer navigation">
        <a
          *ngFor="let item of navItems"
          class="nav-item"
          [routerLink]="item.route"
          routerLinkActive="active-link"
          [routerLinkActiveOptions]="{ exact: true }"
          (click)="closeSidebarOnMobile()"
        >
          <div class="nav-icon">
            <i class="pi" [ngClass]="item.icon"></i>
          </div>

          <span
            class="nav-text"
            *ngIf="!sidebarCollapsed"
            [class.small-text]="item.small"
          >
            {{ item.label }}
          </span>

          <span class="nav-dot" *ngIf="!sidebarCollapsed"></span>
        </a>
      </nav>

      <div class="sidebar-footer">
        <button
          class="sidebar-footer-toggle"
          type="button"
          (click)="toggleSidebar()"
          [attr.aria-label]="sidebarCollapsed ? 'Expand sidebar' : 'Collapse sidebar'"
        >
          <i
            class="pi"
            [ngClass]="sidebarCollapsed ? 'pi-angle-right' : 'pi-angle-left'"
          ></i>
        </button>
      </div>
    </aside>

    <div class="main-panel">
      <header class="topbar">
        <div class="topbar-left">
          <button
            class="mobile-toggle"
            type="button"
            (click)="toggleSidebar()"
            aria-label="Toggle sidebar"
          >
            <i class="pi pi-bars"></i>
          </button>
        </div>

        <div class="topbar-right">
          <button
            class="topbar-icon-btn darkmode-btn"
            type="button"
            (click)="toggleDarkMode()"
            [attr.aria-label]="darkMode ? 'Switch to light mode' : 'Switch to dark mode'"
          >
            <i class="pi" [ngClass]="darkMode ? 'pi-sun' : 'pi-moon'"></i>
          </button>

          <button
            class="topbar-icon-btn notification-btn"
            type="button"
            aria-label="Notifications"
          >
            <i class="pi pi-bell"></i>
          </button>

          <div class="topbar-user">
            <div
              class="topbar-avatar"
              (click)="toggleUserMenu()"
              role="button"
              tabindex="0"
              aria-label="Open user menu"
            >
              {{ currentUserInitial }}
            </div>

            <div class="user-dropdown" *ngIf="userMenuOpen">
              <div class="user-dropdown-header">
                <strong>{{ currentUserName }}</strong>
                <span>{{ currentUserRole }}</span>
              </div>

              <button type="button" class="dropdown-item" (click)="goToProfile()">
                <i class="pi pi-user"></i>
                <span>My Profile</span>
              </button>

              <button type="button" class="dropdown-item" (click)="goToSettings()">
                <i class="pi pi-cog"></i>
                <span>Settings</span>
              </button>

              <div class="dropdown-divider"></div>

              <button type="button" class="dropdown-item logout" (click)="logout()">
                <i class="pi pi-sign-out"></i>
                <span>Sign out</span>
              </button>
            </div>
          </div>
        </div>
      </header>

      <main class="content-area">
        <router-outlet></router-outlet>
      </main>
    </div>
  </div>
</ng-container>

<ng-template #layoutLoading>
  <div class="layout-loading">
    <div class="layout-loading-card">
      <i class="pi pi-spin pi-spinner"></i>
      <span>Loading user session...</span>
    </div>
  </div>
</ng-template>
